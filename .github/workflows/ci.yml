name: ci
on: [push, pull_request]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci || npm i
      
      - name: Build API
        run: npm run -w apps/api build --if-present
      
      - name: Run tests
        run: npm test --workspaces --if-present
