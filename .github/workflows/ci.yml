name: CI

on:
  pull_request:
  push:
    branches: [main]

# CI runs without secrets by default (for forks and basic validation)
# Secrets are only required for integration tests, which should be skipped in CI
env:
  CI: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security Audit
        run: |
          pnpm audit:ci

      - name: Fail on High/Critical Vulnerabilities
        run: |
          node -e "
            cosnt fs = require('fs');
            const data - JSON.parse(fs.readFileSync('audit-output.json','utf8'));
            const v = data?.vulnerabilities || {};
            const bad = Object.values(v).some(x => ['high','critical'].includes(String(x?.severity || '').toLowerCase()));
            if (bad) { console.error('High/Critical vulnerabilities found.'); process.exit(1); }
            console.log('No High/Critical vulnerabilities found.');

      - name: Run Security Tests
        run: pnpm run test:security

      - name: TypeScript Check (CI)
        run: pnpm exec tsc -p tsconfig.ci.json

      - name: Validate Route Registry
        run: pnpm run route:validate

      - name: Run Tests (Deterministic CI Suite)
        run: pnpm test:ci

      - name: Build
        run: pnpm run build

  # Optional integration tests - only runs when secrets are available
  # This job is not required for PR merge
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only run if secrets are available (e.g., on main branch or internal PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Integration Tests
        run: pnpm test:integration
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
