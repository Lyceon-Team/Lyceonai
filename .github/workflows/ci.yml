name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks (hygiene, tsc, tests, build, audit)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    name: Secrets presence check (no values)
    shell: bash
    run: |
      set -euo pipefail
      for k in SUPABASE_URL SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY STRIPE_SECRET_KEY; do
      if [ -n "${!k:-}" ]; then
        echo "$k: set"
      else
        echo "$k: MISSING"
      fi
      done


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match your local pnpm major version for determinism
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Repo hygiene (block artifacts + exports + root debug)
        shell: bash
        run: |
          set -euo pipefail

          echo "Checking for forbidden committed artifacts..."

          # 1) Block tsbuildinfo artifacts
          if git ls-files | grep -E "\.tsbuildinfo$"; then
            echo "ERROR: .tsbuildinfo files are committed. Remove them and add *.tsbuildinfo to .gitignore."
            exit 1
          fi

          # 2) Block accidental root file named "0"
          if [ -f "0" ]; then
            echo "ERROR: Found root file named '0'. Remove it."
            exit 1
          fi

          # 3) Block CSV exports (allow only docs/samples/ if you keep anonymized examples)
          if git ls-files | grep -E "\.csv$" | grep -v "^docs/samples/"; then
            echo "ERROR: CSV files are committed outside docs/samples/. Remove exports and keep only approved anonymized samples."
            exit 1
          fi

          # 4) Block root debug/test clutter
          if ls -1 | grep -E "^(test-|debug-).*\.(js|ts|mjs|cjs)$"; then
            echo "ERROR: Found root test/debug scripts. Move to tests/legacy/ or delete."
            exit 1
          fi

          echo "Repo hygiene OK."

      - name: TypeScript check (tsc)
        run: pnpm run check

      # Unit tests (repo-wide)
      - name: Unit tests (vitest)
        run: pnpm run test

      # API tests (explicit)
      - name: API tests
        run: pnpm run test:api

      - name: Build (vite + esbuild)
        run: pnpm run build

      - name: Dependency audit (high+)
        run: pnpm audit --audit-level=high

  integration:
    name: Integration (secrets-only)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [checks]

    # Run only when secrets are available:
    # - pushes to main (trusted)
    # - PRs from same repo (not forks)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository

    env:
      CI: true
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
      CSRF_ALLOWED_ORIGINS: ${{ secrets.CSRF_ALLOWED_ORIGINS }}
      SITE_URL: ${{ secrets.SITE_URL }}
      PUBLIC_SITE_URL: ${{ secrets.PUBLIC_SITE_URL }}
      BASE_URL: ${{ secrets.BASE_URL }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Replace this with any *real* integration command(s) you have.
      # If you don't have any, remove this whole job.
      - name: Integration smoke (no-op placeholder)
        run: |
          echo "No integration commands defined yet."
          echo "Add scripts like test:integration when ready."
