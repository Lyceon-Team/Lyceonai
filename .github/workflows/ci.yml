name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lint only if defined
      - name: Lint (if present)
        run: pnpm run lint --if-present

      # Typecheck only if defined
      - name: Typecheck (if present)
        run: pnpm run typecheck --if-present

      # Build each workspace safely
      - name: Build workspaces
        run: pnpm -r run build --if-present
