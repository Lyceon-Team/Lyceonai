$kind: collection
name: Lyceon - APIs
description: >-
  Complete API collection for testing mounted endpoints locally.


  See docs/route-registry.md and docs/entitlements-map.md for the canonical
  source of truth.


  ## Quick Start

  1. Sign in via `POST /api/auth/signin` — cookies are set automatically.

  2. All subsequent requests use the stored cookies for auth.

  3. Update collection variables (studentId, sessionId, etc.) as needed.
variables:
  baseUrl: http://localhost:5000
  siteUrl: http://localhost:5173
  testEmail: test@example.com
  testPassword: TestPassword123!
  adminEmail: admin@example.com
  adminPassword: AdminPassword123!
  adminPasscode: ""
  guardianEmail: guardian@example.com
  guardianPassword: GuardianPass123!
  questionId: REPLACE_ME
  studentId: REPLACE_ME
  sessionId: REPLACE_ME
  reviewSessionId: REPLACE_ME
  notificationId: REPLACE_ME
  studentLinkCode: REPLACE_ME
  fullLengthSessionId: REPLACE_ME
  csrfToken: ""
scripts:
  - type: http:beforeRequest
    code: >-
      // Set Origin header for CSRF protection (must match allowed origins)

      pm.request.headers.upsert({ key: 'Origin', value:
      pm.collectionVariables.get('siteUrl') });


      // Automatically handle the double-submit CSRF token for mutating requests

      if (pm.request.method !== 'GET' && pm.request.method !== 'HEAD' &&
      pm.request.method !== 'OPTIONS') {
          const tokenUrl = pm.collectionVariables.get('baseUrl') + '/api/csrf-token';
          pm.sendRequest({
              url: tokenUrl,
              method: 'GET',
              header: { 'Origin': pm.collectionVariables.get('siteUrl') }
          }, function (err, res) {
              if (!err && res.code === 200) {
                  const json = res.json();
                  if (json.csrfToken) {
                      pm.request.headers.upsert({ key: 'x-csrf-token', value: json.csrfToken });
                  }
              }
          });
      }
    language: text/javascript
